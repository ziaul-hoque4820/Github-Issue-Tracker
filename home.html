<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <link rel="shortcut icon" href="./assets/incident-report.png" type="image/x-icon">

    <!-- tailwind+daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-white">

    <!-- Navbar section -->
    <nav class="navbar border-b border-gray-200 px-6 xl:px-44 lg:px-10 py-3 bg-white">
        <div class="navbar-start flex items-center gap-2">
            <img class="w-10 h-10" src="./assets/github-logo.png" alt="logo">
            <span class="text-lg font-bold text-gray-900">Issues Tracker</span>
        </div>

        <div class="navbar-end flex items-center gap-3">
            <label
                class="input input-bordered flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-gray-400 bg-white w-48 sm:w-64">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search issues..."
                    class="grow bg-transparent outline-none text-sm text-gray-700 placeholder-gray-400" />
            </label>

            <button
                class="btn bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold border-none rounded-lg px-4">
                <i class="fa-solid fa-plus"></i>
                New Issue
            </button>
        </div>
    </nav>

    <!-- main Section -->
    <main class="px-6 xl:px-44 lg:px-10 my-5 ">
        <!-- Filter Tabs -->
        <div class="border-1 border-cyan-300 rounded-2xl bg-gray-200 px-6 py-4 mb-4">
            <div id="js-issue-category" class="flex items-center gap-3">
                <button
                    class="btn bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold border-none rounded-lg px-6">All</button>
                <button
                    class="btn btn-outline text-sm font-semibold rounded-lg px-6 border-gray-300 text-gray-700 hover:bg-gray-100 hover:text-gray-900 hover:border-gray-300">Open</button>
                <button
                    class="btn btn-outline text-sm font-semibold rounded-lg px-6 border-gray-300 text-gray-700 hover:bg-gray-100 hover:text-gray-900 hover:border-gray-300">Closed</button>
            </div>
        </div>

        <!-- Issues Container -->
        <div class="border-1 border-cyan-300 rounded-2xl bg-gray-200 px-6 py-6">

            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <!-- Issues Icon -->
                    <div class="w-10 h-10 rounded-lg bg-indigo-100 flex items-center justify-center">
                        <img class="w-6 h-6" src="./assets/Aperture.png" alt="icon">
                    </div>
                    <div>
                        <h2 id="js-issue-counter" class="text-xl font-bold text-gray-900">50 Issues</h2>
                        <p class="text-sm text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>
                <!-- Legend -->
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
                        <span class="text-sm text-gray-600 font-medium">Open</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"></span>
                        <span class="text-sm text-gray-600 font-medium">Closed</span>
                    </div>
                </div>
            </div>

            <!-- Loader Spinner -->
            <div id="loader" class="flex justify-center items-center py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div>
            </div>

            <!-- Issues Grid -->
            <div id="js-issue-cart" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- js code inject here -->

            </div>
        </div>
    </main>

    <!-- Issue details Modal  -->
    <div id="issue-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <!-- Modal Box -->
        <div id="modal-container" class="bg-white rounded-2xl max-w-2xl w-full relative p-8 shadow-2xl">
            <!-- Dynamic Content will be injected here -->
            <div id="issue-modal-content"></div>
        </div>
    </div>

    <script src="./scripts/home.js"></script>
</body>

</html>
